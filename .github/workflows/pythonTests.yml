name: Python Unit Tests and Build

on: [push]

jobs:
  # Primeiro Job: Execución de probas
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout de código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Executar tests
        run: |
          python -m unittest test_utils.py

  # Segundo Job: Creación do executable (só se o test ten éxito)
  build:
    runs-on: ubuntu-latest
    needs: test  # Indica que este job depende do éxito do job 'test'
    
    steps:
      - name: Checkout de código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Crear executable
        run: |
          pyinstaller --onefile main.py

      # Gardar o executable como artefacto
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: python-executable
          path: dist/main